server {
  listen 80;

  # Supabase clients call /rest/v1/* by default.
  # Our PostgREST is mounted at /, so strip the prefix.
  location /rest/v1/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://rest:3000/;
  }

  # Convenience: also proxy root to PostgREST.
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://rest:3000/;
  }
}
